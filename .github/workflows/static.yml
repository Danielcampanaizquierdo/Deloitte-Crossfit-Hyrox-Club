# Deploy to Deno Deploy
# Prerequisites:
#   1. Create a project at https://dash.deno.com
#   2. Set DENO_DEPLOY_TOKEN secret in your GitHub repo (Settings → Secrets)
#   3. Set ADMIN_PASSCODE and SESSION_SECRET env vars in the Deno Deploy dashboard
name: Deploy to Deno Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Deno Deploy
        uses: denoland/deployctl@v1
        with:
          project: "crossfit-hyrox-club"
          entrypoint: "main.ts"
          root: "."
        env:
          DENO_DEPLOY_TOKEN: ${{ secrets.DENO_DEPLOY_TOKEN }}
